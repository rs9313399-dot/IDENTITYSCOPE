services:
  identityscope:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: identityscope
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      DATABASE_URL: file:/app/db/custom.db
    ports:
      - "3000:3000"
    volumes:
      - ./db:/app/db
    restart: unless-stopped
